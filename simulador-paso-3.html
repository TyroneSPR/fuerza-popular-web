<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuerza Popular | Simulador paso 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="topbar">
          <a class="icon-button icon-button--link" href="simulador-paso-2.html" aria-label="Volver al paso anterior">&#8592;</a>
          <p class="topbar__title">Simulador de cédula</p>
          <div class="topbar__spacer"></div>
        </header>

        <section class="simulator-screen">
          <article class="simulator-card simulator-card--step">
            <div class="vote-number">
              <div class="vote-number__sheet">
                <div class="vote-number__box">99</div>
              </div>
            </div>

            <h1>Voto preferencial</h1>

            <p class="simulator-card__description">
              Para Senadores, Diputados y el Parlamento Andino, puedes escribir el número de tus
              candidatos preferidos dentro de los recuadros vacíos. Aquí practicamos pensando en
              la lista de Fuerza Popular.
            </p>

            <div class="simulator-progress" aria-label="Paso 3 de 4">
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot"></span>
            </div>

            <a class="simulator-card__button" href="simulador-paso-4.html">Siguiente</a>
          </article>
        </section>
      </section>
    </main>
    <script src="access.js"></script>
  </body>
</html>

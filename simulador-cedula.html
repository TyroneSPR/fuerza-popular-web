<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuerza Popular | Simulador de cédula</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="topbar">
          <a class="icon-button icon-button--link" href="simulador-paso-6.html" aria-label="Volver al paso anterior">&#8592;</a>
          <p class="topbar__title">Simulador de cédula</p>
          <div class="topbar__spacer"></div>
        </header>

        <section class="detail-panel detail-panel--page">
          <div class="detail-panel__header">
            <p class="detail-panel__eyebrow">Práctica final</p>
            <h1>Explora la cédula</h1>
          </div>

          <p class="simulator-hint simulator-hint--top">
            Usa los botones para acercar la cédula, muévela dentro del recuadro y cambia a
            <strong>Marcar</strong> para pintar encima.
          </p>

          <div class="simulator-toolbar" aria-label="Controles del simulador">
            <button class="simulator-tool" type="button" data-mode="pan">
              Mover
            </button>
            <button class="simulator-tool simulator-tool--active" type="button" data-mode="draw">
              Marcar
            </button>
            <button class="simulator-tool" type="button" id="zoom-out">-</button>
            <button class="simulator-tool" type="button" id="zoom-in">+</button>
            <button class="simulator-tool" type="button" id="clear-drawing">Limpiar</button>
          </div>

          <section class="ballot-simulator">
            <div class="ballot-viewport" id="ballot-viewport">
              <div class="ballot-stage" id="ballot-stage">
                <img
                  id="ballot-image"
                  src="https://raw.githubusercontent.com/TyroneSPR/fuerza-popular-web/main/assets/cedula.png"
                  alt="Cédula de votación 2026 para el simulador"
                />
                <canvas id="ballot-canvas" aria-label="Área para marcar la cédula"></canvas>
              </div>
            </div>
          </section>

          <button class="simulator-card__button simulator-card__button--wide" type="button" id="finish-simulator">
            Siguiente
          </button>

        </section>
      </section>
    </main>
    <script src="simulador.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuerza Popular | Resultado del simulador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="topbar">
          <a class="icon-button icon-button--link" href="simulador-cedula.html" aria-label="Volver a la cédula">&#8592;</a>
          <p class="topbar__title">Resultado del simulador</p>
          <div class="topbar__spacer"></div>
        </header>

        <section class="detail-panel detail-panel--page detail-panel--simulator-tone">
          <div class="detail-panel__header">
            <p class="detail-panel__eyebrow">Simulador completado</p>
            <h1 id="simulador-resultado-titulo">Resultado de tu práctica</h1>
          </div>

          <div class="detail-block">
            <p id="simulador-resultado-texto">
              Estamos revisando tu práctica del simulador.
            </p>
          </div>

          <a class="simulator-card__button simulator-card__button--wide" href="index.html" id="simulador-resultado-boton">
            Finalizar
          </a>
        </section>
      </section>
    </main>
    <script src="access.js"></script>
    <script src="simulador-resultado.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuerza Popular | Simulador paso 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="topbar">
          <a class="icon-button icon-button--link" href="index.html" aria-label="Volver a la portada">&#8592;</a>
          <p class="topbar__title">Simulador de cédula</p>
          <div class="topbar__spacer"></div>
        </header>

        <section class="simulator-screen">
          <article class="simulator-card">
            <div class="simulator-card__brand">
              <div class="simulator-card__logo-frame">
                <img
                  class="simulator-card__logo-image"
                  src="https://raw.githubusercontent.com/TyroneSPR/fuerza-popular-web/main/assets/logo-fuerza-popular.png"
                  alt="Logo de Fuerza Popular"
                />
              </div>
            </div>

            <p class="simulator-card__eyebrow">Simulador de cédula</p>
            <h1>Aprende cómo votar</h1>

            <div class="simulator-card__date">Domingo 12 de abril, 2026</div>

            <p class="simulator-card__text">
              Prepárate para aprender cómo votar por Fuerza Popular en Presidente, Diputados,
              Senadores y Parlamento Andino.
            </p>

            <a class="simulator-card__button" href="simulador-paso-2.html">Siguiente</a>
          </article>
        </section>
      </section>
    </main>
    <script src="access.js"></script>
  </body>
</html>

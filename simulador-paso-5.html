<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuerza Popular | Simulador paso 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="topbar">
          <a class="icon-button icon-button--link" href="simulador-paso-4.html" aria-label="Volver al paso anterior">&#8592;</a>
          <p class="topbar__title">Simulador de cédula</p>
          <div class="topbar__spacer"></div>
        </header>

        <section class="simulator-screen">
          <article class="simulator-card simulator-card--step">
            <div class="blank-vote">
              <div class="blank-vote__sheet">
                <div class="blank-vote__paper">
                  <div class="blank-vote__line"></div>
                  <div class="blank-vote__dashed"></div>
                </div>
              </div>
            </div>

            <h1>Voto en blanco</h1>

            <p class="simulator-card__description">
              Si no marcas ninguna opción en una columna, se contará automáticamente como voto en
              blanco. Por eso es importante marcar bien por Fuerza Popular.
            </p>

            <div class="simulator-progress" aria-label="Paso 5 de 5">
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
            </div>

            <a class="simulator-card__button" href="simulador-paso-6.html">Siguiente</a>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuerza Popular | Simulador paso 7</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"

  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="topbar">
          <a class="icon-button icon-button--link" href="simulador-paso-6.html" aria-label="Volver al paso anterior">&#8592;</a>
          <p class="topbar__title">Simulador de cédula</p>
          <div class="topbar__spacer"></div>
        </header>

        <section class="detail-panel detail-panel--page detail-panel--simulator-tone">
          <div class="detail-panel__header">
            <p class="detail-panel__eyebrow">Ejemplo correcto</p>
            <h1>Esta es la manera correcta de marcar</h1>

          <figure class="image-viewer image-viewer--simulator">
            <img
              src="assets/cedula-marcada.jpeg"
              alt="Ejemplo de cédula correctamente marcada por Fuerza Popular"
            />
          </figure>

          <a class="simulator-card__button simulator-card__button--wide" href="simulador-cedula.html">

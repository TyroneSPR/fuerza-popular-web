<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuerza Popular | Simulador paso 6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="topbar">
          <a class="icon-button icon-button--link" href="simulador-paso-5.html" aria-label="Volver al paso anterior">&#8592;</a>
          <p class="topbar__title">Simulador de cédula</p>
          <div class="topbar__spacer"></div>
        </header>

        <section class="simulator-screen">
          <article class="simulator-card simulator-card--step">
            <div class="gesture-card gesture-card--controls">
              <h1>Usa los botones</h1>
              <div class="control-guide">
                <span class="control-guide__item">Mover</span>
                <span class="control-guide__item control-guide__item--active">Marcar</span>
                <span class="control-guide__item">-</span>
                <span class="control-guide__item">+</span>
                <span class="control-guide__item">Limpiar</span>
              </div>
              <p class="simulator-card__description">
                <strong>Mover</strong> sirve para desplazar la cédula. <strong>Marcar</strong> te
                permite pintar encima. El botón <strong>-</strong> aleja, <strong>+</strong>
                acerca y <strong>Limpiar</strong> borra tus trazos para volver a intentar.
              </p>
            </div>

            <div class="simulator-progress" aria-label="Paso final del simulador">
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
              <span class="simulator-progress__dot simulator-progress__dot--active"></span>
            </div>

            <a class="simulator-card__button" href="simulador-paso-7.html">Siguiente</a>
          </article>
        </section>
      </section>
    </main>
    <script src="access.js"></script>
  </body>
</html>
